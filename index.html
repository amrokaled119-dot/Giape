<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غيابي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --primary: #2563eb;
        }
        body.dark-mode {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
        }
        * { font-family: 'Tajawal', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); transition: 0.3s; line-height: 1.6; padding-top: 80px; }
        
        /* أهم قاعدة لحل مشكلتك */
        .hidden { display: none !important; }
        
        header { position: fixed; top: 0; width: 100%; background: var(--card); border-bottom: 1px solid #ddd; padding: 1rem; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .app-container { max-width: 500px; margin: 0 auto; padding: 1rem; }
        .card { background: var(--card); padding: 2rem; border-radius: 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 1rem; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 1rem; border-radius: 1rem; width: 100%; font-weight: bold; cursor: pointer; margin-top: 1rem; }
        input, select { width: 100%; padding: 0.8rem; margin: 0.5rem 0; border-radius: 0.8rem; border: 1px solid #ddd; background: var(--bg); color: var(--text); }
        .course-card { background: var(--card); padding: 1.5rem; border-radius: 1.5rem; border: 1px solid #eee; margin-bottom: 1rem; }
        .progress-bar { height: 10px; background: #eee; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; transition: 0.5s; }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <div style="background:var(--primary); color:white; width:35px; height:35px; border-radius:8px; display:grid; place-items:center; font-weight:900;">غ</div>
            <h1 style="font-size:1.2rem; font-weight:900;">غيابي</h1>
        </div>
        <div>
            <button onclick="toggleTheme()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">🌙</button>
            <button id="reset-session" class="hidden" onclick="resetAll()" style="color:red; background:none; border:none; font-size:1.2rem; cursor:pointer;">🔄</button>
        </div>
    </header>

    <main class="app-container">
        <section id="onboarding-view" class="card">
            <h2 style="margin-bottom:1rem;">مرحباً بك في غيابي</h2>
            <p style="font-size:0.9rem; color:#666; margin-bottom:1.5rem;">سجل بياناتك للبدء في تتبع محاضراتك بكلية العلوم الإدارية</p>
            <input type="text" id="user-name" placeholder="الاسم الكامل">
            <select id="user-dept">
                <option>إدارة أعمال</option><option>التسويق</option><option>المالية</option><option>المحاسبة</option>
            </select>
            <button class="btn-primary" onclick="startApp()">دخول التطبيق</button>
        </section>

        <section id="setup-view" class="hidden">
            <h2 style="margin-bottom:1rem;">إعداد الجدول الدراسي</h2>
            <div id="days-container"></div>
            <button class="btn-primary" onclick="saveSchedule()">حفظ الجدول والبدء</button>
        </section>

        <section id="dashboard-view" class="hidden">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                <div>
                    <h2 id="hello-user">أهلاً بك</h2>
                    <p id="user-info" style="font-size:0.8rem; color:#666;"></p>
                </div>
                <button onclick="editSchedule()" style="color:var(--primary); font-size:0.8rem; border:none; background:none; cursor:pointer;">تعديل الجدول ⚙️</button>
            </div>
            <div id="courses-list"></div>
        </section>
    </main>

    <script>
        let data = JSON.parse(localStorage.getItem('gyabi_v3')) || null;

        window.onload = () => {
            if(data) {
                showScreen('dashboard-view');
                renderDashboard();
                document.getElementById('reset-session').classList.remove('hidden');
            }
        };

        function showScreen(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
        }

        function startApp() {
            const name = document.getElementById('user-name').value;
            if(!name) return alert("سجل اسمك!");
            data = { profile: {name, dept: document.getElementById('user-dept').value}, courses: [] };
            renderSetup();
            showScreen('setup-view');
        }

        function renderSetup() {
            const days = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس"];
            const container = document.getElementById('days-container');
            container.innerHTML = days.map(day => `
                <div class="card" style="padding:1rem; margin-bottom:0.5rem;">
                    <h4 style="color:var(--primary); margin-bottom:10px;">${day}</h4>
                    <input type="text" class="c-in" data-day="${day}" placeholder="اسم المادة">
                    <input type="text" class="p-in" placeholder="اسم الدكتور">
                </div>
            `).join('');
        }

        function saveSchedule() {
            const names = document.querySelectorAll('.c-in');
            const profs = document.querySelectorAll('.p-in');
            data.courses = [];
            names.forEach((n, i) => {
                if(n.value) data.courses.push({name: n.value, prof: profs[i].value, day: n.dataset.day, absences: 0});
            });
            localStorage.setItem('gyabi_v3', JSON.stringify(data));
            renderDashboard();
            showScreen('dashboard-view');
            document.getElementById('reset-session').classList.remove('hidden');
        }

        function renderDashboard() {
            document.getElementById('hello-user').innerText = `يا هلا ${data.profile.name}`;
            document.getElementById('user-info').innerText = data.profile.dept;
            const list = document.getElementById('courses-list');
            list.innerHTML = data.courses.map((c, i) => {
                const perc = (c.absences / 4) * 100;
                const color = c.absences >= 4 ? 'red' : (c.absences >= 2 ? 'orange' : '#10b981');
                return `
                <div class="course-card">
                    <div style="display:flex; justify-content:space-between;">
                        <h4 style="font-weight:900;">${c.name}</h4>
                        <span style="font-weight:900; color:${color}">${c.absences}/4</span>
                    </div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${perc}%; background:${color}"></div></div>
                    <button onclick="addAbsence(${i})" style="background:var(--bg); border:1px solid #ddd; padding:5px 10px; border-radius:8px; font-size:0.7rem; cursor:pointer;">تسجيل غياب +</button>
                </div>`;
            }).join('');
        }

        function addAbsence(i) {
            if(data.courses[i].absences < 4) {
                data.courses[i].absences++;
                localStorage.setItem('gyabi_v3', JSON.stringify(data));
                renderDashboard();
            } else { alert("وصلت للحرمان في هذه المادة! 💀"); }
        }

        function resetAll() {
            if(confirm("بدء فصل جديد؟")) { localStorage.removeItem('gyabi_v3'); location.reload(); }
        }

        function editSchedule() { renderSetup(); showScreen('setup-view'); }
    </script>
</body>
</html>
